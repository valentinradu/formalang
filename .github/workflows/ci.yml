name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Cap rust-lld's internal thread parallelism. lld parallelises
  # within a single link invocation (`llvm::parallelFor` over
  # sections); on the standard ubuntu-latest runner (4 cores,
  # ~7 GB RAM) the default `--threads=auto` spawns 4 mapping threads
  # per invocation, and even one in-flight link can mmap enough rlib
  # / output-binary pages to push the kernel into reclaiming a page
  # mid-read. The thread that loses its mmap dies with
  # `signal 7 [Bus error]`, surfacing as an intermittent "flake".
  # Single-threaded link is roughly 20-40% slower per invocation but
  # caps peak in-flight mappings to 1 × number-of-parallel-cargo-jobs.
  # Combined with `cargo test --jobs 2` below, total link parallelism
  # is 2 — comfortably fits memory.
  RUSTFLAGS: -C link-arg=-Wl,--threads=1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          # Only cache the registry/git dirs, not `target/`. Caching
          # `target/` across runs causes the runner to fill up: the
          # restored stale artifacts plus the freshly compiled ones
          # don't fit on the ~14GB ephemeral disk, surfacing as
          # `No space left on device` during link.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cap parallelism at 2 jobs.
      #
      # The workspace produces ~44 integration-test binaries; each is
      # statically linked with the full crate + dependency rlib set.
      # On the standard ubuntu-latest runner (4 cores, ~7 GB RAM,
      # ~14 GB ephemeral disk), default `cargo test` runs `ld` in 4
      # parallel processes and each `ld` mmaps the rlib set
      # independently. When peak memory exceeds the page cache budget
      # the kernel evicts mapped pages and `ld` dies with
      # `signal 7 [Bus error]` — visibly intermittent, easy to
      # mistake for a flake. `--jobs 2` halves peak memory; trade is
      # ~30–50% slower compile but reliably green.
      - name: Run tests
        run: cargo test --workspace --jobs 2

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: File-size ceiling (≤500 LOC, ratchet via allowlist)
        run: ./scripts/check_file_sizes.sh

  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
