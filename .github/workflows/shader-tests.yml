name: Shader Tests

on:
  push:
    branches: [main, feat/shader-support]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  shader-tests:
    name: Visual Shader Snapshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: clippy

      - name: Install Mesa for software rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers mesa-utils libvulkan1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Run shader snapshot tests
        env:
          LIBGL_ALWAYS_SOFTWARE: 1
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: cargo test --test shader_snapshots -- --test-threads=1

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shader-diff-images
          path: stdlib/tests/shader_snapshots/diff/
          if-no-files-found: ignore
