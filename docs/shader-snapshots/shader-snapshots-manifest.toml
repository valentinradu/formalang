# Remaining codegen issues

[[tasks]]
name = "Fix WGSL codegen: trait dispatch function generation"
status = "done"
locations = ["src/codegen/wgsl.rs:520-594", "src/codegen/wgsl.rs:1290-1391", "src/codegen/wgsl.rs:1730-1815", "src/ir/lower.rs:276-290"]
notes = """
Comprehensive fixes for trait dispatch function generation:

1. IR lowering fixes:
   - resolve_impl_self_type() resolves `self` to actual struct/enum type in impl context
   - get_variant_fields() handles TypeParam("self") for pattern bindings
   - Bare "self" references in impl blocks now get correct type

2. WGSL codegen fixes:
   - gen_trait_implementor_structs(): Generates struct definitions for trait implementors (fill_Solid, etc.)
   - gen_struct_from_imported(): Generates struct definitions from imported modules
   - collect_dependency_structs(): Collects dependent structs (ColorStop, etc.)
   - gen_trait_implementor_impls(): Generates impl functions for trait implementors
   - gen_let_match_from_foreign(): Handles let statements with match expressions
   - TypeParam handling: Checks for traits (->Data suffix), structs, and enums in source module
   - SelfFieldRef method calls: Looks up field type for proper method mangling

3. Local binding type tracking:
   - local_binding_types field tracks pattern binding types for method call resolution

KNOWN LIMITATION: Recursive trait implementors (like fill::Pattern which has source: Fill)
cause WGSL cyclic function definition errors. This is a WGSL limitation, not a codegen bug.
"""

