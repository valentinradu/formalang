notes = """
Severity: Minor (P4)
Effort: Medium

Theoretical issue: If recursive types bypass semantic validation, enum_field_size_in_f32
could stack overflow. However:
1. Semantic analyzer already detects circular type dependencies (semantic/mod.rs:3264)
2. WGSL doesn't support recursive types anyway
3. No known way to reach codegen with recursive types

Decision: Won't fix - semantic analyzer prevents this. If issues arise, add HashSet<EnumId>
visited parameter to detect cycles.
"""

