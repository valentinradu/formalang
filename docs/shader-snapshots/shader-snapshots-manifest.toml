[[tasks]]
name = "Fix WGSL codegen: non-deterministic HashMap iteration for EnumId lookups"
status = "done"
locations = ["src/codegen/wgsl.rs:2668-2768", "src/codegen/wgsl.rs:1434-1538", "src/codegen/wgsl.rs:1298-1431", "src/codegen/wgsl.rs:2588-2663", "src/codegen/wgsl.rs:2923-2945"]
notes = """
Fixed non-deterministic enum size calculation that caused intermittent test failures.

Root cause: EnumIds are module-local (e.g., EnumId(0) is first enum in THAT module).
Iterating through imported_modules.values() (HashMap) in arbitrary order caused
wrong enum lookups when multiple modules had enums.

Fixes:
1. enum_field_size_in_f32(): Added source_module parameter, check source module FIRST
2. gen_enum_constants(): Added source_module parameter, pass context down
3. binding_type_size_in_f32(): Check source module first, then imported modules
4. gen_binding_load_expr_from_data(): Track enum source module for TypeParam case
5. collect_dependency_enums(): Return (IrEnum, IrModule) tuples like collect_dependency_structs

This ensures deterministic enum resolution regardless of HashMap iteration order.
"""

